<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <!-- <link rel="stylesheet" href="{{ "/assets/styles.css" | relative_url }}"> -->
  <style>
    body {
    margin: 0;
    font-family: Arial, sans-serif;
    display: flex;
    height: 100vh;
  }
  
  .container {
    display: flex;
    width: 100%;
  }
  
  nav {
    width: 20%;
    background-color: #f8f9fa;
    padding: 1rem;
    box-shadow: 2px 0 5px rgba(0, 0, 0, 0.1);
    overflow-y: auto;
  }
  
  nav h2 {
    margin-top: 0;
  }
  
  nav ul {
    list-style: none;
    padding: 0;
  }
  
  nav li {
    margin: 0.5rem 0;
  }
  
  nav a {
    text-decoration: none;
    color: #333;
    display: block;
    padding: 0.5rem;
    border-radius: 4px;
  }
  
  nav a:hover {
    background-color: #e9ecef;
  }
  
  main {
    flex: 1;
    padding: 2rem;
    overflow-y: auto;
  }
  
  </style>
</head>
<body>
  <div class="container">
    <nav>
      <h2>目录</h2>
      <ul>
        {% for page in site.pages %}
          {% if page.path contains "docs" %}
            <li><a href="{{ page.url | relative_url }}">{{ page.title | default: page.name }}</a></li>
          {% endif %}
        {% endfor %}
      </ul>
    </nav>
    <main>
      {{ content }}
    </main>
  </div>
</body>
</html>
